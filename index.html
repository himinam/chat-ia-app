<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="sidebar">
        
        <h2>Chat IA Pro</h2>
        <div id="listaChats"></div>
        <button id="nuevoChat">+ Nuevo Chat</button>
    </div>

    <div class="main">

        <div class="chat" id="chat">
            <div class="mensaje ia">
                Hola 👋 Soy tu asistente virtual
            </div>
        </div>

        <div class="input-area">
            <input id="inputMensaje" placeholder="Escribe un mensaje...">
            <button id="btnEnviar">Enviar</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
